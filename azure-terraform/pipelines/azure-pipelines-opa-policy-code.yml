trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - azure-terraform/policies/opa/**
      - azure-terraform/hcp/policy-scope-catalog*.yaml
      - azure-terraform/hcp/policy-automation.md
      - azure-terraform/pipelines/azure-pipelines-opa-policy-code.yml

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - azure-terraform/policies/opa/**
      - azure-terraform/hcp/policy-scope-catalog*.yaml
      - azure-terraform/hcp/policy-automation.md
      - azure-terraform/pipelines/azure-pipelines-opa-policy-code.yml

name: opa-policy-$(Date:yyyyMMdd)$(Rev:.r)

pool:
  vmImage: $(vmPoolImage)

variables:
  vmPoolImage: ubuntu-latest
  terraformRepoRoot: azure-terraform
  hcpControlPlaneRoot: azure-terraform/hcp/control-plane
  hcpHostname: app.terraform.io
  policyScopeCatalogPath: ../policy-scope-catalog.yaml
  policySetKey: net_new_lz_opa
  policySetName: compeer-net-new-lz-opa
  opaVersion: '1.4.2'
  terraformVersion: '1.5.7'

stages:
  - stage: OpaPolicyCodeValidation
    displayName: OPA policy-code validation
    jobs:
      - job: ValidateOpaPolicyCode
        displayName: Validate OPA policy code
        pool:
          vmImage: $(vmPoolImage)
        steps:
          - checkout: self

          - bash: |
              set -euo pipefail
              mkdir -p "$(Build.ArtifactStagingDirectory)/opa"

              curl -fsSL \
                "https://openpolicyagent.org/downloads/v$(opaVersion)/opa_linux_amd64_static" \
                -o "$(Agent.TempDirectory)/opa"
              chmod +x "$(Agent.TempDirectory)/opa"

              set +e
              "$(Agent.TempDirectory)/opa" fmt --diff \
                "$(terraformRepoRoot)/policies/opa/policies" \
                "$(terraformRepoRoot)/policies/opa/tests" \
                > "$(Build.ArtifactStagingDirectory)/opa/opa-fmt.diff"
              opa_fmt_rc=$?
              set -e

              cat "$(Build.ArtifactStagingDirectory)/opa/opa-fmt.diff"

              if [[ "$opa_fmt_rc" -ne 0 || -s "$(Build.ArtifactStagingDirectory)/opa/opa-fmt.diff" ]]; then
                echo "OPA formatting drift detected. Run opa fmt before merging." >&2
                exit 1
              fi

              "$(Agent.TempDirectory)/opa" test \
                "$(terraformRepoRoot)/policies/opa/policies" \
                "$(terraformRepoRoot)/policies/opa/tests" \
                "$(terraformRepoRoot)/policies/opa/data" \
                | tee "$(Build.ArtifactStagingDirectory)/opa/opa-test.txt"
            displayName: Run OPA format and unit tests

          - task: PublishPipelineArtifact@1
            displayName: Publish OPA policy-code validation evidence
            condition: succeededOrFailed()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/opa'
              artifact: opa-policy-code-validation

  - stage: HcpOpaPolicySetDeployment
    displayName: HCP OPA policy-set deployment
    dependsOn: OpaPolicyCodeValidation
    condition: |
      and(
        succeeded(),
        ne(variables['Build.Reason'], 'PullRequest'),
        in(variables['Build.SourceBranch'], 'refs/heads/main', 'refs/heads/develop')
      )
    jobs:
      - job: PlanAndDeployHcpOpaPolicySet
        displayName: Plan and deploy HCP OPA policy set
        pool:
          vmImage: $(vmPoolImage)
        steps:
          - checkout: self

          - bash: |
              set -euo pipefail

              terraform_zip="$(Agent.TempDirectory)/terraform.zip"
              terraform_bin="$(Agent.TempDirectory)/terraform-bin"
              mkdir -p "$terraform_bin"

              curl -fsSL \
                "https://releases.hashicorp.com/terraform/$(terraformVersion)/terraform_$(terraformVersion)_linux_amd64.zip" \
                -o "$terraform_zip"
              unzip -q -o "$terraform_zip" -d "$terraform_bin"

              echo "##vso[task.prependpath]$terraform_bin"
              "$terraform_bin/terraform" version
            displayName: Install Terraform

          - bash: |
              set -euo pipefail

              is_unset_value() {
                local value="${1:-}"
                [[ -z "$value" || "$value" == \$\(*\) ]]
              }

              csv_to_tf_list() {
                local csv_value="${1:-}"

                if is_unset_value "$csv_value"; then
                  printf '[]'
                  return
                fi

                jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))' <<< "$csv_value"
              }

              missing=0
              for var_name in HCP_TOKEN HCP_ORGANIZATION; do
                var_value="${!var_name:-}"
                if is_unset_value "$var_value"; then
                  echo "Missing required pipeline variable or secret: $var_name" >&2
                  missing=1
                fi
              done

              if [[ "$missing" -ne 0 ]]; then
                exit 1
              fi

              echo "Using HCP organization: $HCP_ORGANIZATION"
              project_scopes_json="$(csv_to_tf_list "${HCP_PROJECT_SCOPES:-}")"
              workspace_scopes_json="$(csv_to_tf_list "${HCP_WORKSPACE_SCOPES:-}")"
              excluded_workspaces_json="$(csv_to_tf_list "${HCP_EXCLUDED_WORKSPACES:-}")"
              upload_policy_content="false"

              if ! is_unset_value "${HCP_UPLOAD_POLICY_CONTENT:-}" && [[ "${HCP_UPLOAD_POLICY_CONTENT,,}" == "true" ]]; then
                upload_policy_content="true"
              fi

              echo "Using project scopes: $project_scopes_json"
              echo "Using workspace scopes: $workspace_scopes_json"
              echo "Using excluded workspaces: $excluded_workspaces_json"
              echo "Upload policy content: $upload_policy_content"

              terraform -chdir="$(hcpControlPlaneRoot)" init -input=false
              terraform -chdir="$(hcpControlPlaneRoot)" fmt -check
              terraform -chdir="$(hcpControlPlaneRoot)" validate

              terraform -chdir="$(hcpControlPlaneRoot)" plan \
                -input=false \
                -out="$(Agent.TempDirectory)/hcp-opa-policy-set.tfplan" \
                -var="hcp_hostname=$(hcpHostname)" \
                -var="hcp_organization=$HCP_ORGANIZATION" \
                -var="policy_source_root_path=../../.." \
                -var="policy_scope_catalog_path=$(policyScopeCatalogPath)" \
                -var="policy_set_key=$(policySetKey)" \
                -var="policy_set_name=$(policySetName)" \
                -var="project_scopes=$project_scopes_json" \
                -var="workspace_scopes=$workspace_scopes_json" \
                -var="excluded_workspaces=$excluded_workspaces_json" \
                -var="manage_policy_set_content=$upload_policy_content"

              terraform -chdir="$(hcpControlPlaneRoot)" show -no-color \
                "$(Agent.TempDirectory)/hcp-opa-policy-set.tfplan" \
                > "$(Build.ArtifactStagingDirectory)/hcp-opa-policy-set-plan.txt"
            displayName: Terraform plan HCP OPA policy set
            env:
              TFE_TOKEN: $(HCP_TOKEN)
              HCP_TOKEN: $(HCP_TOKEN)
              HCP_ORGANIZATION: $(HCP_ORGANIZATION)
              HCP_PROJECT_SCOPES: $(HCP_PROJECT_SCOPES)
              HCP_WORKSPACE_SCOPES: $(HCP_WORKSPACE_SCOPES)
              HCP_EXCLUDED_WORKSPACES: $(HCP_EXCLUDED_WORKSPACES)
              HCP_UPLOAD_POLICY_CONTENT: $(HCP_UPLOAD_POLICY_CONTENT)

          - bash: |
              set -euo pipefail

              terraform -chdir="$(hcpControlPlaneRoot)" apply \
                -input=false \
                -auto-approve \
                "$(Agent.TempDirectory)/hcp-opa-policy-set.tfplan"

              terraform -chdir="$(hcpControlPlaneRoot)" output -json \
                > "$(Build.ArtifactStagingDirectory)/hcp-opa-policy-set-outputs.json"
            displayName: Terraform apply HCP OPA policy set
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            env:
              TFE_TOKEN: $(HCP_TOKEN)

          - task: PublishPipelineArtifact@1
            displayName: Publish HCP OPA policy-set deployment evidence
            condition: succeededOrFailed()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)'
              artifact: hcp-opa-policy-set-deployment
