trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

name: $(Date:yyyyMMdd)$(Rev:.r)

pool:
  vmImage: ubuntu-latest

variables:
  vmPoolImage: ubuntu-latest
  terraformScriptsRoot: azure-terraform
  hcpOrganization: lyonga-org
  hcpWorkspace: azure-cloud
  queueHcpRunFromAdo: 'true'
  allowLatestHcpRun: 'false'
  destructiveChangeEnforcementMode: enforce
  destructiveChangeEnforceOnlyOnPr: 'true'
  requireMediumDestructiveChangeAck: 'true'
  requireHighDestructiveChangeAck: 'true'
  requireHighDestructiveChangeWorkItem: 'true'
  failOnDestroy: 'false'
  failOnHcpPolicyFailure: 'true'
  failOnHcpRunTaskFailure: 'true'

