trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - consumer-repos/online-banking/clientsync/**
      - azure-terraform/scripts/**
      - azure-terraform/pipelines/azure-pipelines-workload-devsecops.yml
      - azure-terraform/pipelines/workspace-maps/clientsync.json

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - consumer-repos/online-banking/clientsync/**
      - azure-terraform/scripts/**
      - azure-terraform/pipelines/azure-pipelines-workload-devsecops.yml
      - azure-terraform/pipelines/workspace-maps/clientsync.json

name: $(Date:yyyyMMdd)$(Rev:.r)

pool:
  vmImage: ubuntu-latest

variables:
  vmPoolImage: ubuntu-latest
  terraformScriptsRoot: azure-terraform
  hcpOrganization: lyonga-org
  terraformWorkingDirectory: ''
  defaultTerraformWorkingDirectory: consumer-repos/online-banking/clientsync/environments/np1
  workloadEnvironmentRootPrefix: consumer-repos/online-banking/clientsync/environments
  hcpWorkspaceMapFile: azure-terraform/pipelines/workspace-maps/clientsync.json
  hcpWorkspaceMap: '{}'
  hcpWorkspacePrefix: ''
  hcpWorkspace: ''
  syncTfeOutputReadToken: 'true'
  queueHcpRunFromAdo: 'true'
  allowLatestHcpRun: 'false'
  destructiveChangeEnforcementMode: enforce
  destructiveChangeEnforceOnlyOnPr: 'true'
  requireMediumDestructiveChangeAck: 'true'
  requireHighDestructiveChangeAck: 'true'
  requireHighDestructiveChangeWorkItem: 'true'
  failOnDestroy: 'false'
  failOnHcpPolicyFailure: 'true'
  failOnHcpRunTaskFailure: 'true'

stages:
  - stage: HcpPlanAndPolicyEvidence
    displayName: ClientSync HCP plan and policy evidence
    dependsOn: []
    condition: always()
    jobs:
      - job: CaptureHcpEvidence
        displayName: Capture ClientSync speculative plan and policy/run task evidence
        pool:
          vmImage: $(vmPoolImage)
        steps:
          - checkout: self
            fetchDepth: 0

          - bash: |
              set -euo pipefail
              if ! command -v jq >/dev/null 2>&1; then
                sudo apt-get update
                sudo apt-get install -y jq
              fi
            displayName: Ensure jq is available

          - bash: |
              set -euo pipefail
              mkdir -p "$(Build.ArtifactStagingDirectory)/hcp"
              chmod +x "$(terraformScriptsRoot)/scripts/resolve-hcp-workspace.sh"

              "$(terraformScriptsRoot)/scripts/resolve-hcp-workspace.sh" \
                --source-dir "$(Build.SourcesDirectory)" \
                --terraform-working-directory "$(terraformWorkingDirectory)" \
                --default-terraform-working-directory "$(defaultTerraformWorkingDirectory)" \
                --environment-root-prefix "$(workloadEnvironmentRootPrefix)" \
                --workspace-map-file "$(hcpWorkspaceMapFile)" \
                --workspace-prefix "$(hcpWorkspacePrefix)" \
                --fallback-workspace "$(hcpWorkspace)" \
                --hcp-organization "$(hcpOrganization)" \
                --output-dir "$(Build.ArtifactStagingDirectory)/hcp"
            displayName: Resolve ClientSync HCP workspace
            env:
              HCP_WORKSPACE_MAP: '$(hcpWorkspaceMap)'

          - bash: |
              set -euo pipefail
              mkdir -p "$(Build.ArtifactStagingDirectory)/hcp"

              if [[ "$(syncTfeOutputReadToken)" == "true" ]]; then
                chmod +x "$(terraformScriptsRoot)/scripts/upsert-hcp-workspace-env-var.sh"

                "$(terraformScriptsRoot)/scripts/upsert-hcp-workspace-env-var.sh" \
                  --organization "$(hcpOrganization)" \
                  --workspace "$(resolvedHcpWorkspace)" \
                  --key TFE_TOKEN \
                  --value-env HCP_OUTPUTS_TOKEN \
                  --fallback-value-env HCP_TOKEN \
                  --output-dir "$(Build.ArtifactStagingDirectory)/hcp"
              else
                echo "TFE_TOKEN workspace sync is disabled."
              fi
            displayName: Sync ClientSync TFE output-read token
            env:
              HCP_TOKEN: $(HCP_TOKEN)
              HCP_OUTPUTS_TOKEN: $(HCP_OUTPUTS_TOKEN)

          - bash: |
              set -euo pipefail
              mkdir -p "$(Build.ArtifactStagingDirectory)/hcp"

              if [[ "$(queueHcpRunFromAdo)" == "true" ]]; then
                chmod +x "$(terraformScriptsRoot)/scripts/queue-hcp-speculative-plan.sh"

                "$(terraformScriptsRoot)/scripts/queue-hcp-speculative-plan.sh" \
                  --organization "$(hcpOrganization)" \
                  --workspace "$(resolvedHcpWorkspace)" \
                  --source-dir "$(Build.SourcesDirectory)" \
                  --vcs-revision "$(Build.SourceVersion)" \
                  --output-dir "$(Build.ArtifactStagingDirectory)/hcp"
              fi
            displayName: Queue ClientSync HCP speculative plan for this commit
            env:
              HCP_TOKEN: $(HCP_TOKEN)

          - bash: |
              set -euo pipefail
              mkdir -p "$(Build.ArtifactStagingDirectory)/hcp"
              chmod +x "$(terraformScriptsRoot)/scripts/capture-hcp-run-evidence.sh"

              run_id_args=()
              if [[ -s "$(Build.ArtifactStagingDirectory)/hcp/run-id.txt" ]]; then
                run_id_args=(--run-id "$(cat "$(Build.ArtifactStagingDirectory)/hcp/run-id.txt")")
              fi

              "$(terraformScriptsRoot)/scripts/capture-hcp-run-evidence.sh" \
                --organization "$(hcpOrganization)" \
                --workspace "$(resolvedHcpWorkspace)" \
                "${run_id_args[@]}" \
                --vcs-revision "$(Build.SourceVersion)" \
                --allow-latest-run "$(allowLatestHcpRun)" \
                --output-dir "$(Build.ArtifactStagingDirectory)/hcp" \
                --fail-on-destroy "$(failOnDestroy)" \
                --fail-on-policy-failure "$(failOnHcpPolicyFailure)" \
                --fail-on-run-task-failure "$(failOnHcpRunTaskFailure)"
            displayName: Fetch HCP plan JSON, policy checks, and run task results
            env:
              HCP_TOKEN: $(HCP_TOKEN)

          - bash: |
              set -euo pipefail
              chmod +x "$(terraformScriptsRoot)/scripts/validate-destructive-change-approval.sh"

              "$(terraformScriptsRoot)/scripts/validate-destructive-change-approval.sh" \
                --plan-json "$(Build.ArtifactStagingDirectory)/hcp/plan.json" \
                --policy-config "$(terraformScriptsRoot)/pipelines/destructive-change-policy.json" \
                --output-dir "$(Build.ArtifactStagingDirectory)/hcp" \
                --enforcement-mode "$(destructiveChangeEnforcementMode)" \
                --enforce-only-on-pr "$(destructiveChangeEnforceOnlyOnPr)" \
                --require-medium-ack "$(requireMediumDestructiveChangeAck)" \
                --require-high-ack "$(requireHighDestructiveChangeAck)" \
                --require-high-work-item "$(requireHighDestructiveChangeWorkItem)"
            displayName: Validate destructive-change acknowledgement
            env:
              ADO_TOKEN: $(System.AccessToken)

          - bash: |
              set -euo pipefail

              if [[ -f "$(Build.ArtifactStagingDirectory)/hcp/summary.md" ]]; then
                echo "##vso[task.uploadsummary]$(Build.ArtifactStagingDirectory)/hcp/summary.md"
              fi

              if [[ -f "$(Build.ArtifactStagingDirectory)/hcp/destructive-change-approval.md" ]]; then
                echo "##vso[task.uploadsummary]$(Build.ArtifactStagingDirectory)/hcp/destructive-change-approval.md"
              fi
            displayName: Publish HCP evidence summaries to build
            condition: succeededOrFailed()

          - task: PublishPipelineArtifact@1
            displayName: Publish HCP plan and policy evidence
            condition: succeededOrFailed()
            inputs:
              targetPath: '$(Build.ArtifactStagingDirectory)/hcp'
              artifact: hcp-plan-policy-evidence
