projects:
  ce-lz-governance:
    description: Global governance and policy foundations for the net-new landing zone.
    workspaces:
      - name: lz-gov-global
        terraform_root: azure-terraform/landing-zones/net-new-hub-spoke/global-governance
        environment: global
        drift_detection: true
        policy_stage: advisory
      - name: lz-policy-baseline-global
        terraform_root: azure-terraform/policies/azure-policy/baseline
        environment: global
        drift_detection: true
        policy_stage: advisory
  ce-lz-platform:
    description: Shared platform services for hub/spoke landing zones.
    workspaces:
      - name: lz-platform-management-np
        terraform_root: azure-terraform/landing-zones/net-new-hub-spoke/platform-management
        environment: np
        drift_detection: true
        policy_stage: advisory
      - name: lz-platform-connectivity-np
        terraform_root: azure-terraform/landing-zones/net-new-hub-spoke/platform-connectivity
        environment: np
        drift_detection: true
        policy_stage: advisory
      - name: lz-platform-identity-np
        terraform_root: azure-terraform/landing-zones/net-new-hub-spoke/platform-identity
        environment: np
        drift_detection: true
        policy_stage: advisory
  ce-lz-workloads:
    description: Application landing-zone workspaces using the new platform outputs.
    workspaces:
      - name: lz-workload-online-banking-np1
        terraform_root: consumer-repos/online-banking/environments/np1
        environment: np1
        drift_detection: true
        policy_stage: advisory

