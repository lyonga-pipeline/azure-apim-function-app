name: Terraform Plan and Apply

on:
  workflow_dispatch:
    inputs:
      stack_path:
        description: "Terraform stack path relative to repo root"
        required: true
        default: "azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api"
      backend_config_path:
        description: "Optional backend config file relative to repo root. Leave blank to auto-use <stack_path>/backend.hcl"
        required: false
        default: ""
      var_file:
        description: "Optional tfvars filename/path inside the stack dir. Use dev.tfvars, not var_file=dev.tfvars"
        required: false
        default: "dev.tfvars"
      import_address:
        description: "Optional Terraform resource address to import before plan/apply"
        required: false
        default: ""
      import_id:
        description: "Optional cloud resource ID to import before plan/apply"
        required: false
        default: ""
      apply:
        description: "Apply the reviewed plan"
        type: boolean
        required: false
        default: false
      environment_name:
        description: "GitHub Environment holding OIDC Azure configuration"
        required: false
        default: "dev"
      lock_timeout:
        description: "Terraform state lock timeout for stateful commands"
        required: false
        default: "5m"

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}
      TF_VAR_demo_windows_vm_admin_password: ${{ secrets.DEMO_WINDOWS_VM_ADMIN_PASSWORD }}
      TF_LOCK_TIMEOUT: ${{ inputs.lock_timeout }}
    concurrency:
      group: terraform-${{ inputs.stack_path }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate OIDC Configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ARM_CLIENT_ID}" || { echo "::error::Missing client ID. Configure AZURE_CLIENT_ID or ARM_CLIENT_ID in GitHub variables/secrets."; exit 1; }
          test -n "${ARM_TENANT_ID}" || { echo "::error::Missing tenant ID. Configure AZURE_TENANT_ID or ARM_TENANT_ID in GitHub variables/secrets."; exit 1; }
          test -n "${ARM_SUBSCRIPTION_ID}" || { echo "::error::Missing subscription ID. Configure AZURE_SUBSCRIPTION_ID or ARM_SUBSCRIPTION_ID in GitHub variables/secrets."; exit 1; }

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Resolve Terraform Inputs
        id: resolve-inputs
        shell: bash
        run: |
          set -euo pipefail

          stack_dir="${GITHUB_WORKSPACE}/${{ inputs.stack_path }}"
          backend_input="${{ inputs.backend_config_path }}"
          var_file_input="${{ inputs.var_file }}"

          case "${{ inputs.stack_path }}" in
            "azure-enterprise-terraform/terraform/stacks/dev/platform-v2/bootstrap")
              echo "::error::The stack path azure-enterprise-terraform/terraform/stacks/dev/platform-v2/bootstrap has been retired. This repo now assumes a precreated shared backend in demotest822e; bootstrap is a platform prerequisite, not an active stack."
              exit 1
              ;;
            "azure-enterprise-terraform/terraform/stacks/dev/platform-v2/subscriptions")
              echo "::error::The stack path azure-enterprise-terraform/terraform/stacks/dev/platform-v2/subscriptions has been retired. Use azure-enterprise-terraform/terraform/global/subscriptions instead."
              exit 1
              ;;
            "azure-enterprise-terraform/terraform/stacks/dev/platform-v2/governance")
              echo "::error::The stack path azure-enterprise-terraform/terraform/stacks/dev/platform-v2/governance has been retired. Use azure-enterprise-terraform/terraform/global/management-groups, azure-enterprise-terraform/terraform/global/policy, and azure-enterprise-terraform/terraform/global/role-assignments instead."
              exit 1
              ;;
          esac

          if [ ! -d "${stack_dir}" ]; then
            echo "::error::Terraform stack path not found: ${{ inputs.stack_path }}"
            exit 1
          fi

          backend_input="${backend_input#backend_config_path=}"
          var_file_input="${var_file_input#var_file=}"

          if [ -n "${backend_input}" ]; then
            backend_path="${GITHUB_WORKSPACE}/${backend_input}"
          else
            backend_path="${stack_dir}/backend.hcl"
          fi

          if [ -f "${backend_path}" ]; then
            resolved_backend="${backend_path}"
          elif [ -f "${backend_path}.example" ]; then
            resolved_backend="${backend_path}.example"
          else
            echo "::error::Backend config file not found: ${backend_path} or ${backend_path}.example"
            exit 1
          fi

          if [ -n "${var_file_input}" ]; then
            candidate_var_file="${var_file_input}"
          elif [ -f "${stack_dir}/dev.tfvars" ]; then
            candidate_var_file="dev.tfvars"
          elif [ -f "${stack_dir}/global.auto.tfvars" ]; then
            candidate_var_file="global.auto.tfvars"
          elif [ -f "${stack_dir}/dev.auto.tfvars" ]; then
            candidate_var_file="dev.auto.tfvars"
          elif [ -f "${stack_dir}/terraform.auto.tfvars" ]; then
            candidate_var_file="terraform.auto.tfvars"
          elif [ -f "${stack_dir}/dev.tfvars.example" ]; then
            candidate_var_file="dev.tfvars.example"
          else
            candidate_var_file=""
          fi

          if [ -n "${candidate_var_file}" ]; then
            if [ -f "${stack_dir}/${candidate_var_file}" ]; then
              resolved_var_file="${candidate_var_file}"
            elif [ -f "${GITHUB_WORKSPACE}/${candidate_var_file}" ]; then
              resolved_var_file="${GITHUB_WORKSPACE}/${candidate_var_file}"
            else
              echo "::error::Var file not found: ${candidate_var_file}"
              exit 1
            fi
          else
            resolved_var_file=""
          fi

          echo "backend_config=${resolved_backend}" >> "${GITHUB_OUTPUT}"
          echo "var_file=${resolved_var_file}" >> "${GITHUB_OUTPUT}"

      - name: Terraform Init
        working-directory: ${{ inputs.stack_path }}
        run: terraform init -backend-config="${{ steps.resolve-inputs.outputs.backend_config }}"

      - name: Terraform Format
        working-directory: ${{ inputs.stack_path }}
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: ${{ inputs.stack_path }}
        run: terraform validate

      - name: Terraform Import
        if: ${{ inputs.import_address != '' && inputs.import_id != '' }}
        working-directory: ${{ inputs.stack_path }}
        shell: bash
        run: |
          set -euo pipefail

          import_address="${{ inputs.import_address }}"
          import_id="${{ inputs.import_id }}"

          if terraform state show "${import_address}" >/dev/null 2>&1; then
            echo "Resource already exists in Terraform state: ${import_address}"
            exit 0
          fi

          if [ -n "${{ steps.resolve-inputs.outputs.var_file }}" ]; then
            terraform import -lock-timeout="${TF_LOCK_TIMEOUT}" -var-file="${{ steps.resolve-inputs.outputs.var_file }}" "${import_address}" "${import_id}"
          else
            terraform import -lock-timeout="${TF_LOCK_TIMEOUT}" "${import_address}" "${import_id}"
          fi

      - name: Terraform Plan
        working-directory: ${{ inputs.stack_path }}
        run: |
          set -euo pipefail
          if [ -n "${{ steps.resolve-inputs.outputs.var_file }}" ]; then
            terraform plan -lock-timeout="${TF_LOCK_TIMEOUT}" -out=tfplan -var-file="${{ steps.resolve-inputs.outputs.var_file }}"
          else
            terraform plan -lock-timeout="${TF_LOCK_TIMEOUT}" -out=tfplan
          fi

      - name: Terraform Destroy
        #if: ${{ inputs.apply == true }}
        shell: bash
        working-directory: ${{ inputs.stack_path }}
        run: |
          set -euo pipefail

          while IFS= read -r address; do
            [ -n "${address}" ] || continue

            if terraform state show -no-color "${address}" | grep -q 'Microsoft.KeyVault/vaults/keys@'; then
              echo "Removing non-deletable Key Vault key ARM resource from state: ${address}"
              terraform state rm "${address}"
            fi
          done < <(terraform state list | grep 'azapi_resource' || true)

          if [ -n "${{ steps.resolve-inputs.outputs.var_file }}" ]; then
            terraform destroy -lock-timeout="${TF_LOCK_TIMEOUT}" -auto-approve -var-file="${{ steps.resolve-inputs.outputs.var_file }}"
          else
            terraform destroy -lock-timeout="${TF_LOCK_TIMEOUT}" -auto-approve
          fi

      # - name: Upload Plan Artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: tfplan-${{ github.run_id }}
      #     path: ${{ inputs.stack_path }}/tfplan

      # - name: Terraform Apply
      #   if: ${{ inputs.apply == true }}
      #   working-directory: ${{ inputs.stack_path }}
      #   run: terraform apply -lock-timeout="${TF_LOCK_TIMEOUT}" -auto-approve tfplan
