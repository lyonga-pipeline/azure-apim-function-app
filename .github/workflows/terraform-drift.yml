name: Terraform Configuration Drift Detection

on:
  workflow_dispatch:
    inputs:
      stack_path:
        description: "Terraform stack path relative to repo root"
        required: false
        default: "azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api"
      backend_config_path:
        description: "Optional backend config file relative to repo root. Leave blank to auto-use <stack_path>/backend.hcl"
        required: false
        default: ""
      var_file:
        description: "Optional tfvars filename/path inside the stack dir. Use dev.tfvars, not var_file=dev.tfvars"
        required: false
        default: "dev.tfvars"
      environment_name:
        description: "GitHub Environment holding OIDC Azure configuration"
        required: false
        default: "dev"
      lock_timeout:
        description: "Terraform state lock timeout for stateful commands"
        required: false
        default: "5m"
  schedule:
    - cron: "41 3 * * *"

permissions:
  id-token: write
  contents: read
  issues: write

jobs:
  terraform-plan:
    name: Terraform Drift Plan
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name || 'dev' }}
    concurrency:
      group: terraform-${{ inputs.stack_path || 'azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api' }}
      cancel-in-progress: false
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID != '' && vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_CLIENT_ID || secrets.ARM_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID != '' && vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_SUBSCRIPTION_ID || secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID != '' && vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID != '' && secrets.AZURE_TENANT_ID || secrets.ARM_TENANT_ID }}
      ARM_SKIP_PROVIDER_REGISTRATION: true
      STACK_PATH: ${{ inputs.stack_path || 'azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api' }}
      BACKEND_CONFIG_PATH: ${{ inputs.backend_config_path || '' }}
      VAR_FILE: ${{ inputs.var_file || 'dev.tfvars' }}
      TF_LOCK_TIMEOUT: ${{ inputs.lock_timeout || '5m' }}
    outputs:
      tfplanExitCode: ${{ steps.tf-plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Validate OIDC Configuration
        shell: bash
        run: |
          set -euo pipefail
          test -n "${ARM_CLIENT_ID}" || { echo "::error::Missing client ID. Configure AZURE_CLIENT_ID or ARM_CLIENT_ID in GitHub variables/secrets."; exit 1; }
          test -n "${ARM_TENANT_ID}" || { echo "::error::Missing tenant ID. Configure AZURE_TENANT_ID or ARM_TENANT_ID in GitHub variables/secrets."; exit 1; }
          test -n "${ARM_SUBSCRIPTION_ID}" || { echo "::error::Missing subscription ID. Configure AZURE_SUBSCRIPTION_ID or ARM_SUBSCRIPTION_ID in GitHub variables/secrets."; exit 1; }

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Resolve Terraform Inputs
        id: resolve-inputs
        shell: bash
        run: |
          set -euo pipefail

          stack_dir="${GITHUB_WORKSPACE}/${STACK_PATH}"
          backend_input="${BACKEND_CONFIG_PATH#backend_config_path=}"
          var_file_input="${VAR_FILE#var_file=}"

          if [ -n "${backend_input}" ]; then
            backend_path="${GITHUB_WORKSPACE}/${backend_input}"
          else
            backend_path="${stack_dir}/backend.hcl"
          fi

          if [ -f "${backend_path}" ]; then
            resolved_backend="${backend_path}"
          elif [ -f "${backend_path}.example" ]; then
            resolved_backend="${backend_path}.example"
          else
            echo "::error::Backend config file not found: ${backend_path} or ${backend_path}.example"
            exit 1
          fi

          if [ -n "${var_file_input}" ]; then
            candidate_var_file="${var_file_input}"
          elif [ -f "${stack_dir}/dev.tfvars" ]; then
            candidate_var_file="dev.tfvars"
          elif [ -f "${stack_dir}/global.auto.tfvars" ]; then
            candidate_var_file="global.auto.tfvars"
          elif [ -f "${stack_dir}/dev.auto.tfvars" ]; then
            candidate_var_file="dev.auto.tfvars"
          elif [ -f "${stack_dir}/terraform.auto.tfvars" ]; then
            candidate_var_file="terraform.auto.tfvars"
          elif [ -f "${stack_dir}/dev.tfvars.example" ]; then
            candidate_var_file="dev.tfvars.example"
          else
            candidate_var_file=""
          fi

          if [ -n "${candidate_var_file}" ]; then
            if [ -f "${stack_dir}/${candidate_var_file}" ]; then
              resolved_var_file="${candidate_var_file}"
            elif [ -f "${GITHUB_WORKSPACE}/${candidate_var_file}" ]; then
              resolved_var_file="${GITHUB_WORKSPACE}/${candidate_var_file}"
            else
              echo "::error::Var file not found: ${candidate_var_file}"
              exit 1
            fi
          else
            resolved_var_file=""
          fi

          echo "backend_config=${resolved_backend}" >> "${GITHUB_OUTPUT}"
          echo "var_file=${resolved_var_file}" >> "${GITHUB_OUTPUT}"

      - name: Terraform Init
        working-directory: ${{ env.STACK_PATH }}
        run: terraform init -backend-config="${{ steps.resolve-inputs.outputs.backend_config }}"

      - name: Terraform Plan
        id: tf-plan
        working-directory: ${{ env.STACK_PATH }}
        run: |
          export exitcode=0
          if [ -n "${{ steps.resolve-inputs.outputs.var_file }}" ]; then
            terraform plan -lock-timeout="${TF_LOCK_TIMEOUT}" -detailed-exitcode -no-color -out tfplan -var-file="${{ steps.resolve-inputs.outputs.var_file }}" || export exitcode=$?
          else
            terraform plan -lock-timeout="${TF_LOCK_TIMEOUT}" -detailed-exitcode -no-color -out tfplan || export exitcode=$?
          fi

          echo "exitcode=${exitcode}" >> "$GITHUB_OUTPUT"

          if [ "${exitcode}" -eq 1 ]; then
            echo "Terraform plan failed"
            exit 1
          fi

      - name: Publish Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ env.STACK_PATH }}/tfplan

      - name: Create String Output
        id: tf-plan-string
        working-directory: ${{ env.STACK_PATH }}
        run: |
          TERRAFORM_PLAN=$(terraform show -no-color tfplan)

          delimiter="$(openssl rand -hex 8)"
          echo "summary<<${delimiter}" >> "$GITHUB_OUTPUT"
          echo "## Terraform Plan Output" >> "$GITHUB_OUTPUT"
          echo "<details><summary>${STACK_PATH}</summary>" >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo '```terraform' >> "$GITHUB_OUTPUT"
          echo "$TERRAFORM_PLAN" >> "$GITHUB_OUTPUT"
          echo '```' >> "$GITHUB_OUTPUT"
          echo "</details>" >> "$GITHUB_OUTPUT"
          echo "${delimiter}" >> "$GITHUB_OUTPUT"

      - name: Publish Terraform Plan to Task Summary
        env:
          SUMMARY: ${{ steps.tf-plan-string.outputs.summary }}
        run: echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish Drift Report
        if: steps.tf-plan.outputs.exitcode == 2
        uses: actions/github-script@v7
        env:
          SUMMARY: ${{ steps.tf-plan-string.outputs.summary }}
          STACK_PATH: ${{ env.STACK_PATH }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Terraform Drift Detected: ${process.env.STACK_PATH}`;
            const body = `${process.env.SUMMARY}`;
            const creator = 'github-actions[bot]';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator,
              per_page: 100,
            });

            const match = issues.data.find((issue) => issue.title === title);

            if (match) {
              if (match.body !== body) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: match.number,
                  body,
                });
              }
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }

      - name: Close Drift Report
        if: steps.tf-plan.outputs.exitcode == 0
        uses: actions/github-script@v7
        env:
          STACK_PATH: ${{ env.STACK_PATH }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const title = `Terraform Drift Detected: ${process.env.STACK_PATH}`;
            const creator = 'github-actions[bot]';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              creator,
              per_page: 100,
            });

            const match = issues.data.find((issue) => issue.title === title);
            if (match) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                state: 'closed',
              });
            }

      - name: Error on Drift
        if: steps.tf-plan.outputs.exitcode == 2
        run: exit 1
