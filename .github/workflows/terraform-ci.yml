name: Terraform CI

on:
  pull_request:
    paths:
      - "azure-enterprise-terraform/**"
      - ".github/workflows/terraform-*.yml"
  push:
    branches:
      - main
    paths:
      - "azure-enterprise-terraform/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  fmt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Format
        run: terraform fmt -check -recursive azure-enterprise-terraform/terraform

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack:
          - azure-enterprise-terraform/terraform/global/subscriptions
          - azure-enterprise-terraform/terraform/global/management-groups
          - azure-enterprise-terraform/terraform/global/policy
          - azure-enterprise-terraform/terraform/global/role-assignments
          - azure-enterprise-terraform/terraform/stacks/dev/platform-v2/connectivity
          - azure-enterprise-terraform/terraform/stacks/dev/platform-v2/management
          - azure-enterprise-terraform/terraform/stacks/dev/platform-v2/identity
          - azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ matrix.stack }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.stack }}
        run: terraform validate

  lock-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check lock files are committed
        shell: bash
        run: |
          set -euo pipefail
          stacks=(
            azure-enterprise-terraform/terraform/global/subscriptions
            azure-enterprise-terraform/terraform/global/management-groups
            azure-enterprise-terraform/terraform/global/policy
            azure-enterprise-terraform/terraform/global/role-assignments
            azure-enterprise-terraform/terraform/stacks/dev/platform-v2/connectivity
            azure-enterprise-terraform/terraform/stacks/dev/platform-v2/management
            azure-enterprise-terraform/terraform/stacks/dev/platform-v2/identity
            azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api
          )
          missing=()
          for stack in "${stacks[@]}"; do
            if [ ! -f "${stack}/.terraform.lock.hcl" ]; then
              missing+=("${stack}/.terraform.lock.hcl")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing committed lock files. Run 'terraform init' in each stack and commit .terraform.lock.hcl:"
            printf '  %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All lock files present."

  tflint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack:
          - azure-enterprise-terraform/terraform/global/subscriptions
          - azure-enterprise-terraform/terraform/global/management-groups
          - azure-enterprise-terraform/terraform/global/policy
          - azure-enterprise-terraform/terraform/global/role-assignments
          - azure-enterprise-terraform/terraform/stacks/dev/platform-v2/connectivity
          - azure-enterprise-terraform/terraform/stacks/dev/platform-v2/management
          - azure-enterprise-terraform/terraform/stacks/dev/platform-v2/identity
          - azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.0

      - name: Init TFLint
        working-directory: ${{ matrix.stack }}
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run TFLint
        working-directory: ${{ matrix.stack }}
        run: tflint --format compact

  checkov:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stack:
          - name: global-subscriptions
            path: azure-enterprise-terraform/terraform/global/subscriptions
            skip_checks: ""
          - name: global-management-groups
            path: azure-enterprise-terraform/terraform/global/management-groups
            skip_checks: ""
          - name: global-policy
            path: azure-enterprise-terraform/terraform/global/policy
            skip_checks: ""
          - name: global-role-assignments
            path: azure-enterprise-terraform/terraform/global/role-assignments
            skip_checks: ""
          - name: connectivity
            path: azure-enterprise-terraform/terraform/stacks/dev/platform-v2/connectivity
            skip_checks: CKV2_AZURE_31
          - name: management
            path: azure-enterprise-terraform/terraform/stacks/dev/platform-v2/management
            skip_checks: CKV2_AZURE_1,CKV2_AZURE_21,CKV2_AZURE_33
          - name: identity
            path: azure-enterprise-terraform/terraform/stacks/dev/platform-v2/identity
            skip_checks: CKV2_AZURE_31,CKV2_AZURE_32
          - name: finserv-api
            path: azure-enterprise-terraform/terraform/stacks/dev/workload-v2/finserv-api
            skip_checks: CKV2_ADO_1,CKV2_AZURE_1,CKV2_AZURE_21,CKV2_AZURE_32,CKV2_AZURE_33,CKV2_AZURE_40,CKV2_AZURE_45,CKV_AZURE_212,CKV_AZURE_225

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Print Revision
        run: |
          echo "Git revision: $(git rev-parse HEAD)"

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          python -m pip install "checkov==3.2.500"
          checkov --version

      - name: Run Checkov
        shell: bash
        env:
          CHECKOV_SARIF_PATH: ${{ runner.temp }}/checkov-${{ matrix.stack.name }}.sarif
        run: |
          set +e
          skip_checks="${{ matrix.stack.skip_checks }}"
          if [ -n "$skip_checks" ]; then
            extra_args=(--skip-check "$skip_checks")
          else
            extra_args=()
          fi

          checkov \
            -d ./${{ matrix.stack.path }} \
            --framework terraform \
            --compact \
            "${extra_args[@]}" \
            -o cli
          cli_exit=$?

          rm -f "${CHECKOV_SARIF_PATH}"
          checkov \
            -d ./${{ matrix.stack.path }} \
            --framework terraform \
            --compact \
            "${extra_args[@]}" \
            -o sarif \
            --output-file-path "${CHECKOV_SARIF_PATH}"
          sarif_exit=$?

          set -e
          if [ "${cli_exit}" -ne 0 ]; then
            exit "${cli_exit}"
          fi
          exit "${sarif_exit}"

      - name: Upload SARIF file
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ runner.temp }}/checkov-${{ matrix.stack.name }}.sarif
          category: checkov-${{ matrix.stack.name }}
